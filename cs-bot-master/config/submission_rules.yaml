    - "退款"
    - "退钱"
    - "退token"
    - "退费"
    - "开票"
    - "发票"
    - "报销"
    - "封禁"
    - "封号"
    - "非claw"
    - "kimi主站"

  human_request:
    - "转人工"
    - "找人工"
    - "要人工"
    - "人工客服"
    - "找真人"
    - "找客服"
    - "接人工"
