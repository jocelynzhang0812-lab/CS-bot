    - "人工"

  wrong_answer:
    - "回答错误"
    - "你说错了"
    - "不对"
    - "错了"
    - "答非所问"
    - "没回答我的问题"
    - "文不对题"
    - "胡说"
    - "乱说"
    - "瞎说"
    - "你搞错了"
    - "理解错了"
    - "回答不对"
    - "说错了"
    - "答错了"
    - "你说得不对"
    - "不是这样的"

  product_feedback:
    - "建议"
    - "希望能"
    - "能不能"
    - "增加功能"
    - "优化"
    - "改进"
    - "想要"
    - "需求"
    - "提议"
    - "期待"
    - "建议增加"
    - "希望支持"
    - "能不能加"
    - "能不能支持"
    - "如果能有"
    - "强烈建议"

  emotion:
    - "太差了"
    - "垃圾"
    - "愤怒"
    - "生气"
    - "投诉"
    - "坑爹"
    - "废物"
    - "破"
    - "火大"
    - "烦躁"

# ── 3. 路由动作映射 ─────────────────────────────────────────────────────────
# 定义每种意图对应的标准动作名，供 cs_sop_router 使用。
# -----------------------------------------------------------------------------
router_actions:
  human_request: "human_handoff_with_table"   # 入表 + 转人工
  wrong_answer: "wrong_answer_table"           # 入表
  product_feedback: "product_feedback_table"   # 写入产品建议表
  special_request: "human_handoff"             # 仅转人工，不入表
  tech_bug_complete: "bug_report"              # 入表（传统 bug）
  tech_bug_incomplete: "clarify"               # 继续收集
  default: "clarify"                           # 默认继续收集
