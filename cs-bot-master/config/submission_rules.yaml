# =============================================================================
# Kimi Claw CS Bot — 用户反馈入表规则配置
# =============================================================================
# 本文件是入表规则的单一来源（Single Source of Truth）。
# 任何对"什么场景必须入表 / 严禁入表"的修改，应优先在此文件中进行，
# 然后由 csbot/config/loader.py 加载到各 Skill 中执行。
# =============================================================================

# ── 1. 入表规则 ─────────────────────────────────────────────────────────────
# must_submit    : 满足条件时必须写入多维表格
# must_not_submit: 满足条件时严禁写入多维表格
# -----------------------------------------------------------------------------
submission_rules:
  must_submit:
    - name: tech_bug
      description: "Kimi Claw 技术故障（信息收集完整）"
      conditions:
        - "intent == tech_bug"
        - "collected_complete == true"
      issue_type: "bug"
      scene: "技术故障"
      required_fields:
        - product_type
        - issue_desc
        - time
      table_write: true
      human_handoff: false

    - name: tech_bug_max_rounds
      description: "Kimi Claw 技术故障（已达最大追问轮次，强制入表）"
      conditions:
        - "intent == tech_bug"
        - "max_rounds_reached == true"
      issue_type: "bug"
      scene: "技术故障（信息不完整）"
      required_fields: []
      table_write: true
      human_handoff: false
      note: "已达最大追问轮次，即使信息缺失也强制入表"

    - name: human_request
      description: "用户主动要求转人工"
      conditions:
        - "intent == human_request"
      issue_type: "human_request"
      scene: "用户主动要求转人工"
      required_fields:
        - product_type
        - issue_desc
      table_write: true
      human_handoff: true
      note: "用户明确要求转人工时，既要入表记录诉求，也要立即执行转人工"

    - name: wrong_answer
      description: "用户反馈回答错误"
      conditions:
        - "intent == wrong_answer"
      issue_type: "wrong_answer"
      scene: "用户反馈回答错误"
      required_fields:
        - product_type
        - issue_desc
      table_write: true
      human_handoff: false
      note: "用户指出 bot 回答错误时，必须入表以便人工复盘纠正"

    - name: product_feedback
      description: "用户产品建议"
      conditions:
        - "intent == product_feedback"
      issue_type: "product_feedback"
      scene: "用户产品建议"
      required_fields:
        - content
      table_write: true
      human_handoff: false
      note: "用户提出的产品建议直接写入产品建议表格"

    - name: follow_up
      description: "续跟（问题未解决）"
      conditions:
        - "is_follow_up == true"
      issue_type: "bug"
      scene: "续跟"
      required_fields: []
      table_write: true
      human_handoff: false

  must_not_submit:
    - name: special_request
      description: "退款/开票/封禁等特殊请求"
      conditions:
        - "is_special == true"
      table_write: false
      human_handoff: true
      note: "退款、开票、封禁等走专属流程，不入 bug 表"

    - name: kb_hit
      description: "知识库命中直接解决"
      conditions:
        - "kb_hit == true"
      table_write: false
      human_handoff: false
      note: "FAQ 已直接回答，无需入表；若用户后续说未解决，会转为续跟/tech_bug"

    - name: self_check_resolved
      description: "自助检查后已解决"
      conditions:
        - "self_check_resolved == true"
      table_write: false
      human_handoff: false

    - name: out_of_scope
      description: "非 Kimi 产品 / 超出服务范围"
      conditions:
        - "out_of_scope == true"
      table_write: false
      human_handoff: false

# ── 2. 意图识别关键词 ─────────────────────────────────────────────────────────
# 集中管理所有意图识别关键词，避免分散在各 Python 文件中。
# 修改此处即可调整 bot 对用户表达的识别灵敏度。
